syntax = "proto3";

option csharp_namespace = "QuizboxUI.Protos";

message ConfigColor {
  uint32 red = 1;
  uint32 green = 2;
  uint32 blue = 3;
}

message ConfigColorPatch {
  optional uint32 red = 2;
  optional uint32 green = 4;
  optional uint32 blue = 6;
}

message ConfigSnapshot {
  uint32 schema_version = 1;
  uint32 revision = 2;
  uint32 timer_60_seconds = 3;
  uint32 timer_120_seconds = 4;
  uint32 timer_530_single_seconds = 5;
  uint32 timer_530_double_seconds = 6;
  uint32 contest_seconds = 7;
  uint32 contest_pause_seconds = 8;
  uint32 timer_expired_holdoff_ms = 9;
  uint32 pairing_timeout_ms = 10;
  uint32 buzzer_volume_percent = 11;
  ConfigColor power_led_color = 12;
  ConfigColor active_top_red_team = 13;
  ConfigColor active_top_green_team = 14;
  ConfigColor active_front_red_team = 15;
  ConfigColor active_front_green_team = 16;
  ConfigColor idle_front_red_team = 17;
  ConfigColor idle_front_green_team = 18;
  uint32 idle_top_red_brightness = 19;
  uint32 idle_top_green_brightness = 20;
  uint32 contest_gap_ms = 21;
  ConfigColor ble_read_only_color = 22;
  ConfigColor ble_write_authorized_color = 23;
  ConfigColor ble_pairing_color = 24;
  uint32 ble_pin_max_failures = 25;
  uint32 ble_pin_lockout_ms = 26;
  uint32 ble_stale_bond_quick_timeout_ms = 27;
  uint32 ble_stale_bond_strikes = 28;
  optional bool bleed_mode_enabled = 29;
}

message ConfigPatch {
  optional uint32 timer_60_seconds = 2;
  optional uint32 timer_120_seconds = 4;
  optional uint32 timer_530_single_seconds = 6;
  optional uint32 timer_530_double_seconds = 8;
  optional uint32 contest_seconds = 10;
  optional uint32 contest_pause_seconds = 12;
  optional uint32 timer_expired_holdoff_ms = 14;
  optional uint32 pairing_timeout_ms = 16;
  optional uint32 buzzer_volume_percent = 18;
  ConfigColorPatch power_led_color = 19;
  ConfigColorPatch active_top_red_team = 20;
  ConfigColorPatch active_top_green_team = 21;
  ConfigColorPatch active_front_red_team = 22;
  ConfigColorPatch active_front_green_team = 23;
  ConfigColorPatch idle_front_red_team = 24;
  ConfigColorPatch idle_front_green_team = 25;
  optional uint32 idle_top_red_brightness = 27;
  optional uint32 idle_top_green_brightness = 29;
  optional uint32 contest_gap_ms = 31;
  ConfigColorPatch ble_read_only_color = 32;
  ConfigColorPatch ble_write_authorized_color = 33;
  ConfigColorPatch ble_pairing_color = 34;
  optional uint32 ble_pin_max_failures = 35;
  optional uint32 ble_pin_lockout_ms = 36;
  optional uint32 ble_stale_bond_quick_timeout_ms = 37;
  optional uint32 ble_stale_bond_strikes = 38;
  optional bool bleed_mode_enabled = 39;
}

message StoredDeviceConfig {
  optional uint32 schema_version = 1;
  optional uint32 revision = 2;
  optional uint32 timer_60_seconds = 3;
  optional uint32 timer_120_seconds = 4;
  optional uint32 timer_530_single_seconds = 5;
  optional uint32 timer_530_double_seconds = 6;
  optional uint32 contest_seconds = 7;
  optional uint32 contest_pause_seconds = 8;
  optional uint32 timer_expired_holdoff_ms = 9;
  optional uint32 pairing_timeout_ms = 10;
  optional uint32 buzzer_volume_percent = 11;
  ConfigColorPatch power_led_color = 12;
  ConfigColorPatch active_top_red_team = 13;
  ConfigColorPatch active_top_green_team = 14;
  ConfigColorPatch active_front_red_team = 15;
  ConfigColorPatch active_front_green_team = 16;
  ConfigColorPatch idle_front_red_team = 17;
  ConfigColorPatch idle_front_green_team = 18;
  optional uint32 idle_top_red_brightness = 19;
  optional uint32 idle_top_green_brightness = 20;
  optional uint32 contest_gap_ms = 21;
  ConfigColorPatch ble_read_only_color = 22;
  ConfigColorPatch ble_write_authorized_color = 23;
  ConfigColorPatch ble_pairing_color = 24;
  optional uint32 ble_pin_max_failures = 25;
  optional uint32 ble_pin_lockout_ms = 26;
  optional uint32 ble_stale_bond_quick_timeout_ms = 27;
  optional uint32 ble_stale_bond_strikes = 28;
  optional bool bleed_mode_enabled = 29;
}

message ConfigMessage {
  enum Command {
    GET = 0;
    SET = 1;
    RESET = 2;
    NOTIFY = 3;
  }

  enum Result {
    OK = 0;
    INVALID = 1;
    STORE_ERROR = 2;
  }

  optional Command command = 1;
  Result result = 2;
  ConfigSnapshot current = 3;
  ConfigPatch patch = 4;
}
