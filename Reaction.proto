syntax = "proto3";

import "Quizbox.proto";
import "DeviceInfo.proto";
import "FirmwareUpdate.proto";
import "Config.proto";

option csharp_namespace = "QuizboxUI.Protos";

message BleAccessMessage {
  enum Status {
    NO_CONNECTION    = 0;
    READ_ONLY        = 1;
    WRITE_AUTHORIZED = 2;
    PAIRING_MODE     = 3;
  }

  enum WriteRejectReason {
    WRITE_REJECT_UNKNOWN           = 0;
    WRITE_REJECT_NOT_AUTHORIZED    = 1;
    WRITE_REJECT_NOT_PAIRED        = 2;
    WRITE_REJECT_NOT_ENCRYPTED     = 3;
    WRITE_REJECT_NOT_AUTHENTICATED = 4;
  }

  Status status = 1;
  bool write_rejected = 2;
  WriteRejectReason reject_reason = 3;
  uint32 conn_handle = 4;
}

message Reaction {
  enum MESSAGE_TYPE {
    Query   = 0;
    Command = 1;
    Update  = 2;
  }
  
  enum QUERY_TYPE {
    Unset        = 0;
    DeviceInfo   = 1;
  }

  optional MESSAGE_TYPE type           = 1;
  optional QUERY_TYPE   queryType      = 2;
  uint32       sequenceNumber = 3; //potentially unused
  uint32       timestamp      = 4; //in milliseconds since wake

  oneof message {
    QuizboxMessage quizbox = 10;
    DeviceInfo device_info = 11;
    FirmwareUpdate firmware_update = 12;
    ConfigMessage config = 13;
    BleAccessMessage ble_access = 14;
  }
}
